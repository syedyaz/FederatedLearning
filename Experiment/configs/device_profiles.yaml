# Device Profile Configurations for Federated Learning Simulation

devices:
  high_end_smartphone:
    name: "High-End Smartphone"
    cpu: "8-core ARM Cortex-A78 (2.84 GHz)"
    gpu: "Mali-G78 MP24"
    memory_gb: 8
    memory_type: "LPDDR5"
    bandwidth_5g_mbps: 100
    bandwidth_wifi_mbps: 1000
    power_peak_w: 5
    power_idle_w: 1
    throughput_fp32_gflops: 500
    throughput_int8_gflops: 2000
    throughput_int4_gflops: 4000
    capabilities:
      - full_precision
      - mixed_precision
      - sparse_updates
    local_epochs: 5
    batch_size: 64
    learning_rate: 0.01
    
  mid_range_smartphone:
    name: "Mid-Range Smartphone"
    cpu: "6-core ARM Cortex-A76 (2.2 GHz)"
    gpu: "Adreno 640"
    memory_gb: 4
    memory_type: "LPDDR4X"
    bandwidth_5g_mbps: 50
    bandwidth_wifi_mbps: 500
    power_peak_w: 3
    power_idle_w: 0.5
    throughput_fp32_gflops: 200
    throughput_int8_gflops: 800
    throughput_int4_gflops: 1600
    capabilities:
      - mixed_precision
      - sparse_updates
    local_epochs: 3
    batch_size: 32
    learning_rate: 0.01
    
  iot_device:
    name: "IoT Edge Device"
    cpu: "ARM Cortex-A53 (1.4 GHz, 4 cores)"
    gpu: null
    memory_gb: 2
    memory_type: "LPDDR3"
    bandwidth_5g_mbps: 25
    bandwidth_wifi_mbps: 150
    power_peak_w: 1
    power_idle_w: 0.1
    throughput_fp32_gflops: 20
    throughput_int8_gflops: 80
    throughput_int4_gflops: 160
    capabilities:
      - aggressive_quantization
      - sparse_updates
    local_epochs: 1
    batch_size: 16
    learning_rate: 0.01
    
  edge_server:
    name: "Edge Server/Gateway"
    cpu: "Intel Xeon or ARM Neoverse-N1 (8+ cores)"
    gpu: "Optional NVIDIA Jetson or Edge TPU"
    memory_gb: 16
    memory_type: "DDR4"
    bandwidth_ethernet_mbps: 1000
    bandwidth_wifi_mbps: 1000
    power_peak_w: 20
    power_idle_w: 5
    throughput_fp32_gflops: 2000
    throughput_int8_gflops: 8000
    throughput_int4_gflops: 16000
    capabilities:
      - full_precision
      - mixed_precision
      - sparse_updates
      - assist_weaker_devices
    local_epochs: 5
    batch_size: 64
    learning_rate: 0.01

# Device distribution for heterogeneous scenarios
device_distribution:
  high_end_smartphone: 0.30
  mid_range_smartphone: 0.40
  iot_device: 0.25
  edge_server: 0.05

# Compression parameters per device type
compression_by_device:
  high_end_smartphone:
    weight_bits: 16
    activation_bits: 8
    sparsity_ratio: 1.0  # No sparsification
    
  mid_range_smartphone:
    weight_bits: 8
    activation_bits: 4
    sparsity_ratio: 0.1  # Top 10%
    
  iot_device:
    weight_bits: 4
    activation_bits: 2
    sparsity_ratio: 0.05  # Top 5%
    
  edge_server:
    weight_bits: 16
    activation_bits: 8
    sparsity_ratio: 1.0
